name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          # CI runs without real API keys — agents use stubs
          GROQ_API_KEY: "ci-placeholder"
          OPENAI_API_KEY: "ci-placeholder"
          ENVIRONMENT: "development"
        run: pytest tests/test_phase1.py -v --tb=short

  frontend-check:
    name: Frontend build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check / build
        run: npm run build
